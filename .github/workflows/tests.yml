name: Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Execute unit tests
    runs-on: ubuntu-latest
    permissions: {}

    env:
      RUSTC_WRAPPER: "sccache"
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - name: Set up shared compilation cache
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
    - name: Check out repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Install Rust LLVM tools preview
      run: rustup component add llvm-tools-preview
    - name: Install Rust coverage tool
      uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
      with:
        tool: cargo-llvm-cov
    - name: Fetch Rust dependencies
      run: cargo fetch
    - name: Check formatting
      run: cargo fmt --check
    - name: Build
      run: cargo build
    - name: Run tests
      run: |
        cargo llvm-cov test --cobertura --verbose --output-path cobertura.xml
    - name: Check for lint warnings with Clippy
      run: cargo clippy
    - name: Upload test coverage to Coveralls.io
      with:
        fail-on-error: false
      uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b  # v2.3.6
